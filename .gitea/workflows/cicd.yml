name: CI/CD ChronoTrak

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: docker
    steps:
      - name: Configuration du runner
        run: |
          apk add --no-cache \
            git \
            curl \
            ca-certificates \
            bash \
            python3 \
            build-base \
            libffi-dev

          if ! command -v python >/dev/null 2>&1; then
            ln -s "$(which python3)" /usr/local/bin/python || true
          fi

          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          python --version || python3 --version
          uv --version

      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Cache des dépendances Python avec uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Installation des dépendances avec uv
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.13
          uv sync --extra dev --frozen
          source .venv/bin/activate
          python --version

      - name: Lint et format (Ruff)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate
          echo "🔍 Vérification Ruff (lint + format)..."
          ruff check app config.py run.py wsgi.py management tests migrations
          ruff format --check app config.py run.py wsgi.py management tests migrations
          echo "✅ Ruff OK"

  security:
    runs-on: docker
    steps:
      - name: Configuration du runner
        run: |
          apk add --no-cache \
            git \
            curl \
            ca-certificates \
            bash \
            python3 \
            build-base \
            libffi-dev

          if ! command -v python >/dev/null 2>&1; then
            ln -s "$(which python3)" /usr/local/bin/python || true
          fi

          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"

          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          fi

          python --version || python3 --version
          uv --version
          trivy --version

      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Cache des dépendances Python avec uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Installation des dépendances avec uv
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.13
          uv sync --extra dev --frozen
          source .venv/bin/activate
          python --version

      - name: Audit de sécurité - Scan Trivy filesystem
        run: |
          echo "🔒 Scan de sécurité Trivy (filesystem)..."
          trivy filesystem . \
            --severity CRITICAL \
            --scanners vuln,secret \
            --exit-code 1 \
            --format table
          echo "✅ Scan Trivy filesystem terminé"

      # pip-audit utilise la base PyPI/OSV : détecte les CVE Python que Trivy peut manquer.
      - name: Audit de sécurité - pip-audit (CVE dépendances Python)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate
          echo "🔒 Audit des vulnérabilités des dépendances Python (pip-audit)..."
          pip-audit --desc || { echo "❌ pip-audit a détecté des vulnérabilités"; exit 1; }
          echo "✅ pip-audit terminé"

      - name: Audit de sécurité - Bandit (analyse statique du code Python)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate

          echo "🔒 Audit de sécurité du code avec Bandit..."
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            --severity-level high \
            --confidence-level high \
            -c pyproject.toml || true

          echo "📊 Résumé Bandit:"
          python -c 'import json, sys; data = json.load(open("bandit-report.json")); metrics = data.get("metrics", {}).get("_totals", {}); high = metrics.get("SEVERITY.HIGH", 0); medium = metrics.get("SEVERITY.MEDIUM", 0); low = metrics.get("SEVERITY.LOW", 0); print(f"  - HIGH: {high}"); print(f"  - MEDIUM: {medium}"); print(f"  - LOW: {low}"); sys.exit(1 if high > 0 else 0)' || {
            echo "❌ Bandit a détecté des problèmes HIGH de sécurité"
            exit 1
          }
          echo "✅ Audit Bandit terminé"

  unit-tests:
    runs-on: docker
    steps:
      - name: Configuration du runner
        run: |
          apk add --no-cache \
            git \
            curl \
            ca-certificates \
            bash \
            python3 \
            build-base \
            libffi-dev

          if ! command -v python >/dev/null 2>&1; then
            ln -s "$(which python3)" /usr/local/bin/python || true
          fi

          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          python --version || python3 --version
          uv --version

      - name: Checkout du code
        uses: actions/checkout@v6

      - name: Cache des dépendances Python avec uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Installation des dépendances avec uv
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.13
          uv sync --extra dev --frozen
          source .venv/bin/activate
          python --version

      - name: Configuration de l'environnement de test
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate
          export ENCRYPTION_KEY=${ENCRYPTION_KEY:-$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")}
          echo "ENCRYPTION_KEY=${ENCRYPTION_KEY}" >> $GITEA_ENV
          echo "FLASK_ENV=testing" >> $GITEA_ENV

      - name: Exécution des tests unitaires
        env:
          ENCRYPTION_KEY: ${{ env.ENCRYPTION_KEY }}
          FLASK_ENV: testing
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate

          echo "🧪 Exécution des tests..."
          if [ ! -d "tests" ] && ! find . -name "test_*.py" -o -name "*_test.py" 2>/dev/null | grep -q .; then
            echo "❌ Aucun test trouvé dans le projet"
            exit 1
          fi

          pytest --cov=app --cov-report=term-missing --cov-report=xml -q
          echo "✅ Tous les tests sont passés"

      - name: Rapport de couverture (si disponible)
        if: success() || failure()
        run: |
          if [ ! -f "coverage.xml" ]; then
            echo "ℹ️ Aucun rapport de couverture disponible"
            exit 0
          fi

          export PATH="$HOME/.local/bin:$PATH"
          source .venv/bin/activate
          echo "📊 Rapport de couverture généré"
          python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); line_rate = float(root.get('line-rate', 0)) * 100; print(f'Couverture de code: {line_rate:.2f}%')" || echo "Impossible de lire le rapport de couverture"

  build-and-deploy:
    needs: [ lint, security, unit-tests ]
    if: gitea.ref == 'refs/heads/main' || gitea.ref == 'refs/heads/master'
    runs-on: docker
    steps:
      - name: Configuration du runner
        run: |
          apk add --no-cache \
            docker \
            docker-cli-buildx \
            git \
            curl \
            bash \
            openssh-client \
            file

          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          fi

          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking=no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Checkout du code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calcul du hash des fichiers de build
        id: cache-hash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            DOCKERFILE_HASH=$(sha256sum Dockerfile | cut -d' ' -f1)
            PYPROJECT_HASH=$(sha256sum pyproject.toml | cut -d' ' -f1)
            UVLOCK_HASH=$(sha256sum uv.lock | cut -d' ' -f1)
          elif command -v sha256 >/dev/null 2>&1; then
            DOCKERFILE_HASH=$(sha256 -q Dockerfile)
            PYPROJECT_HASH=$(sha256 -q pyproject.toml)
            UVLOCK_HASH=$(sha256 -q uv.lock)
          else
            DOCKERFILE_HASH=$(md5sum Dockerfile | cut -d' ' -f1)
            PYPROJECT_HASH=$(md5sum pyproject.toml | cut -d' ' -f1)
            UVLOCK_HASH=$(md5sum uv.lock | cut -d' ' -f1)
          fi

          CACHE_KEY_HASH=$(echo "${DOCKERFILE_HASH}-${PYPROJECT_HASH}-${UVLOCK_HASH}" | sha256sum | cut -d' ' -f1 || echo "${DOCKERFILE_HASH}-${PYPROJECT_HASH}-${UVLOCK_HASH}")

          echo "DOCKERFILE_HASH=${DOCKERFILE_HASH}" >> $GITEA_ENV
          echo "PYPROJECT_HASH=${PYPROJECT_HASH}" >> $GITEA_ENV
          echo "UVLOCK_HASH=${UVLOCK_HASH}" >> $GITEA_ENV
          echo "CACHE_KEY_HASH=${CACHE_KEY_HASH}" >> $GITEA_ENV
          echo "Hash Dockerfile: ${DOCKERFILE_HASH:0:12}..."
          echo "Hash pyproject.toml: ${PYPROJECT_HASH:0:12}..."
          echo "Hash uv.lock: ${UVLOCK_HASH:0:12}..."
          echo "Clé de cache: ${CACHE_KEY_HASH:0:16}..."

      - name: Configuration du cache Docker
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ env.CACHE_KEY_HASH }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Détecter la version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$VERSION" ]; then
            BRANCH=$(git branch --show-current)
            if [[ "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              VERSION="$BRANCH"
            fi
          fi
          if [ -z "$VERSION" ]; then
            VERSION="v1.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> $GITEA_ENV
          echo "Version détectée: $VERSION"

      - name: Login au registre Docker
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login forge.apacher.eu -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build et push de l'image Docker
        run: |
          set -e

          echo "Nettoyage préventif des conteneurs BuildKit..."
          docker container ls -q --filter "name=buildx_buildkit" | xargs -r docker container stop || true
          docker container ls -aq --filter "name=buildx_buildkit" | xargs -r docker container rm || true

          BUILDER_NAME="chronotrak-builder"

          if docker buildx ls | grep -q "$BUILDER_NAME"; then
            echo "Utilisation du builder existant: $BUILDER_NAME"
            docker buildx use $BUILDER_NAME
          else
            echo "Création d'un nouveau builder: $BUILDER_NAME"
            docker buildx create --name $BUILDER_NAME --use
          fi

          echo "Démarrage du build de l'image..."
          docker buildx build --provenance=false --push \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-from=type=registry,ref=forge.apacher.eu/aurelien-dazy/chronotrak:buildcache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --cache-to=type=registry,ref=forge.apacher.eu/aurelien-dazy/chronotrak:buildcache,mode=max \
            --build-arg VERSION="${{ env.VERSION }}" \
            --tag forge.apacher.eu/aurelien-dazy/chronotrak:latest \
            --tag forge.apacher.eu/aurelien-dazy/chronotrak:${{ env.VERSION }} \
            --progress=plain \
            .

          echo "Build terminé avec succès"

      - name: Gestion du cache et nettoyage sécurisé
        if: always()
        run: |
          if [ -d "/tmp/.buildx-cache-new" ]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
            echo "Cache mis à jour"
          fi

          echo "Nettoyage ciblé des conteneurs BuildKit..."
          BUILDKIT_CONTAINERS=$(docker container ls -aq --filter "name=buildx_buildkit" --filter "label=org.mobyproject.buildkit.worker.executor=oci" 2>/dev/null || echo "")

          if [ ! -z "$BUILDKIT_CONTAINERS" ]; then
            echo "Suppression des conteneurs BuildKit: $BUILDKIT_CONTAINERS"
            docker container rm -f $BUILDKIT_CONTAINERS 2>/dev/null || true
          fi

          docker buildx prune -f --reserved-space=1GB 2>/dev/null || true
          docker image prune -f --filter "dangling=true" 2>/dev/null || true
          docker volume ls --filter "name=buildx_buildkit_" --format "{{.Name}}" | xargs -r docker volume rm 2>/dev/null || true

      - name: Scan Trivy - Image Docker finale
        run: |
          echo "🔒 Scan de sécurité Trivy - Image Docker finale..."
          trivy image forge.apacher.eu/aurelien-dazy/chronotrak:latest \
            --severity HIGH,CRITICAL \
            --ignore-status fixed \
            --format table \
            --exit-code 1 || {
              echo "⚠️ Des vulnérabilités HIGH/CRITICAL détectées dans l'image Docker"
              exit 1
            }
          echo "✅ Scan Trivy image terminé"

      - name: Configuration de la clé SSH
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Test de connexion SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p ${{ secrets.PROD_SSH_PORT }} ${{ secrets.PROD_SSH_USERNAME }}@${{ secrets.PROD_SSH_HOST }} "echo 'Connexion SSH réussie'"

      - name: Sauvegarde de la base de données
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p ${{ secrets.PROD_SSH_PORT }} ${{ secrets.PROD_SSH_USERNAME }}@${{ secrets.PROD_SSH_HOST }} "
            set -ex
            echo 'Création du répertoire de sauvegarde'
            mkdir -p ${{ secrets.PROJECT_DIRECTORY }}/backups

            echo 'Sauvegarde de la base de données'
            cd ${{ secrets.PROJECT_DIRECTORY }}

            BACKUP_DATE=\$(date +'%Y%m%d_%H%M%S')

            docker run --rm -v docker-chronotrak_chronotrak_data:/app/instance -v ${{ secrets.PROJECT_DIRECTORY }}/backups:/backup alpine sh -c \"
              if [ -f /app/instance/chronotrak.db ]; then
                cp /app/instance/chronotrak.db /backup/chronotrak_\${BACKUP_DATE}.db
                echo 'Sauvegarde effectuée avec succès'
              else
                echo 'Base de données non trouvée dans le volume'
                touch /backup/chronotrak_\${BACKUP_DATE}_empty.txt
              fi
            \"

            cd ${{ secrets.PROJECT_DIRECTORY }}/backups
            ls -t chronotrak_*.db | tail -n +11 | xargs -r rm

            echo 'Sauvegarde terminée'
          "

      - name: Déploiement sur le serveur de production
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -p ${{ secrets.PROD_SSH_PORT }} ${{ secrets.PROD_SSH_USERNAME }}@${{ secrets.PROD_SSH_HOST }} "
            set -ex
            echo 'Début du déploiement'
            cd ${{ secrets.PROJECT_DIRECTORY }}

            docker login forge.apacher.eu -u ${{ secrets.REGISTRY_USERNAME }} -p ${{ secrets.REGISTRY_PASSWORD }}

            ENVIRONMENT=production docker compose pull
            ENVIRONMENT=production docker compose up -d

            docker system prune -f
            docker volume ls --filter \"name=buildx_buildkit_\" --format \"{{.Name}}\" | xargs -r docker volume rm 2>/dev/null || true
            docker logout forge.apacher.eu

            echo 'Déploiement terminé avec succès'
          "

      - name: Health check post-déploiement
        env:
          PROD_HEALTH_URL: ${{ secrets.PROD_HEALTH_URL }}
        run: |
          if [ -z "$PROD_HEALTH_URL" ]; then
            echo "ℹ️ PROD_HEALTH_URL non configuré, health check ignoré"
            exit 0
          fi
          apk add --no-cache curl
          echo "🏥 Vérification de l'application après déploiement..."
          for i in 1 2 3 4 5 6; do
            if curl -sf --max-time 10 "$PROD_HEALTH_URL" | grep -q '"status"'; then
              echo "✅ Health check OK"
              exit 0
            fi
            echo "Tentative $i/6 - attente 10s..."
            sleep 10
          done
          echo "❌ Health check échoué après 6 tentatives"
          exit 1
